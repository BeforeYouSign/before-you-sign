<!DOCTYPE html>
<html>
<head>
  <title>Before You Sign</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial;
      text-align: center;
      padding: 40px;
      background: #f5f5f5;
    }
    .box {
      background: white;
      padding: 30px;
      border-radius: 10px;
    }
    button {
      padding: 10px 20px;
      background: black;
      color: white;
      border: none;
    }
  </style>
</head>
<body>

<div class="box">
  <h1>Before You Sign</h1>
  <p>Upload your building contract and get a clear breakdown before signing.</p>

 <input type="file" id="contractFile" accept=".pdf,.doc,.docx"><br><br>

<button onclick="checkFile()">
  Review My Contract
</button>

<script>
  function checkFile() {
    const fileInput = document.getElementById('contractFile');

    if (!fileInput.files.length) {
      alert('Please choose a PDF or Word document first.');
      return;
    }

    const file = fileInput.files[0];

    // Show processing message
    alert('Uploading ' + file.name + '...');

    // Simulate AI processing delay
    setTimeout(() => {
      alert('Analysis complete. Your contract review will be available soon.');
    }, 2000);
  }
</script>
</div>

</body>
</html>
