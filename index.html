<!DOCTYPE html>
<html>
<head>
  <title>Before You Sign</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial;
      text-align: center;
      padding: 40px;
      background: linear-gradient(to bottom, #f7f9fc, #eef2f7);
    }
    .box {
  background: white;
  padding: 40px;
  border-radius: 12px;
  max-width: 600px;
  margin: auto;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}
button {
  padding: 14px 24px;
  background: #0b0f1a;
  color: white;
  border: none;
  border-radius: 8px;
  font-weight: bold;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  background: #1a2238;
}
  </style>
</head>
<body>

<div class="box">
<img src="https://via.placeholder.com/200x80?text=BYS" alt="Before You Sign Logo" style="margin-bottom:20px;">
<h1 style="margin-top:0;">Before You Sign</h1>
  <p>Upload your building contract and get a clear breakdown before signing.</p>

 <input type="file" id="contractFile" accept=".pdf,.doc,.docx"><br><br>

<button onclick="checkFile()">
  Review My Contract
</button>

<p id="statusMessage"></p>

<div id="loadingBarContainer" style="display:none; width:100%; background:#ddd; border-radius:10px; margin:20px 0;">
  <div id="loadingBar" style="width:0%; height:14px; background:#111; border-radius:10px;"></div>
</div>

<div id="results" style="margin-top:20px; text-align:left;"></div>

<script>
  function checkFile() {
    const fileInput = document.getElementById('contractFile');
    const status = document.getElementById('statusMessage');
    const results = document.getElementById('results');
    const loadingBarContainer = document.getElementById('loadingBarContainer');
    const loadingBar = document.getElementById('loadingBar');

    if (!fileInput.files.length) {
      status.innerText = 'Please choose a PDF or Word document first.';
      return;
    }

    const file = fileInput.files[0];

    status.innerText = 'Reading ' + file.name + '...';
    results.innerHTML = '';
    loadingBarContainer.style.display = 'block';
    loadingBar.style.width = '0%';

    let progress = 0;

    const loading = setInterval(() => {
      progress += 10;
      loadingBar.style.width = progress + '%';

      if (progress === 30) {
        status.innerText = 'Identifying key contract sections...';
      }

      if (progress === 60) {
        status.innerText = 'Preparing plain-English questions...';
      }

      if (progress >= 100) {
        clearInterval(loading);
        status.innerText = 'Analysis complete.';
        loadingBarContainer.style.display = 'none';

        results.innerHTML = `
  <div style="background:#fff; padding:20px; border-radius:10px; box-shadow:0 5px 15px rgba(0,0,0,0.1);">
    
    <h3 style="margin-top:0;">Contract Review Summary</h3>

    <div style="margin-bottom:15px;">
      <strong>⚠️ Key Risk</strong>
      <p style="margin:5px 0;">Variation pricing terms are unclear and may allow unexpected cost increases.</p>
    </div>

    <div style="margin-bottom:15px;">
      <strong>💰 Cost Concern</strong>
      <p style="margin:5px 0;">Provisional sums may significantly increase your final contract price.</p>
    </div>

    <div style="margin-bottom:15px;">
      <strong>⏱ Time Risk</strong>
      <p style="margin:5px 0;">No enforceable penalties for builder delays identified.</p>
    </div>

    <div style="margin-bottom:15px;">
      <strong>📄 Important Note</strong>
      <p style="margin:5px 0;">Builder retains broad discretion over material substitutions.</p>
    </div>

  </div>
`;
      }
    }, 500);
  }
</script>
</div>

</body>
</html>
